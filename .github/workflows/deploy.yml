name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apresentaokalil-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript
        run: |
          node --check src/worker.js
          node --check public/scripts/shared-state.js
          node --check public/scripts/mobile.js
          node --check public/scripts/panel.js
          node --check public/scripts/deck.js
          node --check public/scripts/realtime-adapter.js
          node --check public/scripts/qr.js
          node --check public/scripts/qr-lib.js

      - name: Deploy Worker
        run: pnpm dlx wrangler@4.111.0 deploy --config wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
